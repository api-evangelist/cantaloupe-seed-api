name: Cantaloupe Seed API
description: >-
  The Cantaloupe Seed API connects point-of-sale and self-service retail
  equipment to Cantaloupe's cloud-based vending management platform,
  enabling cashless payment processing, real-time sales tracking, and
  consolidated reporting across vending, micro markets, office coffee,
  and unattended retail channels. Seed APIs compile transactions, fees,
  and payments into a single bill and expose sales analytics so operators
  can monitor performance, payment types, and profitability across their
  fleet.
